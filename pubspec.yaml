name: evntly
description: A premium campus event discovery platform for students.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core & Auth
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.10
  
  # State Management & Routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  
  # UI & UX
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  timeago: ^3.7.0
  
  # Utilities
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  share_plus: ^10.1.2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
